<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Veylify Entegrasyon Örneği</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, sans-serif; background: #f5f6f9; color: #12131f; }
    .wrap { max-width: 460px; margin: 40px auto; padding: 0 20px; }
    .card { background: #fff; border: 1px solid #e7e9ef; border-radius: 20px; padding: 28px; box-shadow: 0 1px 3px rgba(16,24,40,.06); }
    h1 { font-size: 22px; margin: 0 0 6px; }
    .sub { color: #5c6072; font-size: 14px; margin: 0 0 22px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    input[type=email], input[type=password] { width: 100%; height: 44px; border: 1px solid #d7dae3; border-radius: 12px; padding: 0 12px; font-size: 15px; outline: none; }
    input:focus { border-color: #4a41e8; box-shadow: 0 0 0 4px #e0e5ff; }
    .specter-slot { margin: 20px 0; }
    button.submit { width: 100%; height: 46px; margin-top: 8px; border: none; border-radius: 12px; background: #4a41e8; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    button.submit:disabled { opacity: .5; cursor: default; }
    .result { margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 13px; display: none; }
    .result.ok { display: block; background: #dcfce7; color: #16803c; }
    .result.err { display: block; background: #fee2e2; color: #b91c1c; }
    .keyrow { margin-bottom: 20px; }
    .keyrow input { width: 100%; height: 40px; border: 1px solid #d7dae3; border-radius: 10px; padding: 0 12px; font-family: monospace; font-size: 13px; }
    .hint { font-size: 12px; color: #8b8fa3; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Örnek Kayıt Formu</h1>
      <p class="sub">Veylify widget'ının gerçek bir formda çalışması. Bu bir müşteri sitesi simülasyonudur.</p>

      <div class="keyrow">
        <label for="key">Site anahtarı (pk_live_...)</label>
        <input id="key" placeholder="pk_live_... (panelden kopyala)" />
        <div class="hint">Panelden site anahtarını yapıştır, ardından "Widget'ı yükle"ye bas.</div>
        <button class="submit" style="margin-top:10px" onclick="yukle()">Widget'ı yükle</button>
      </div>

      <form id="form" style="display:none" onsubmit="return gonder(event)">
        <label for="email">E-posta</label>
        <input id="email" type="email" required placeholder="siz@ornek.com" />
        <label for="pw">Şifre</label>
        <input id="pw" type="password" required placeholder="••••••••" />

        <div class="specter-slot">
          <div id="specter-widget"></div>
        </div>

        <button class="submit" id="submitBtn" type="submit" disabled>Kayıt ol</button>
        <div class="result" id="result"></div>
      </form>
    </div>
  </div>

  <script src="/veylify.js"></script>
  <script>
    var ORIGIN = location.origin;
    function yukle() {
      var key = document.getElementById("key").value.trim();
      if (!key) return;
      document.getElementById("form").style.display = "block";
      document.getElementById("specter-widget").setAttribute("data-sitekey", key);
      document.getElementById("specter-widget").className = "veylify specter";
      window.Veylify.render(document.getElementById("specter-widget"));
    }
    // widget doğrulanınca submit'i aç
    document.addEventListener("veylify-verified", function () {
      document.getElementById("submitBtn").disabled = false;
    });
    function gonder(e) {
      e.preventDefault();
      var token = document.querySelector("[name='veylify-token']");
      var r = document.getElementById("result");
      if (token && token.value) {
        r.className = "result ok";
        r.textContent = "✓ Form gönderildi. Veylify token backend'e iletildi: " + token.value.slice(0, 24) + "…";
      } else {
        r.className = "result err";
        r.textContent = "Önce insan doğrulamasını tamamlayın.";
      }
      return false;
    }
  </script>
</body>
</html>
